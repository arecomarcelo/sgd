# Vhost OpenLiteSpeed — dashboard.oficialsport.com.br (SGD)

Referência para provisionar o vhost do SGD na VPS `195.200.1.244`, replicando
os 3 ajustes de WebSocket já validados no SGR (ver memória de projeto
`projeto-websocket-openlitespeed` e `documentacao/Historico.md` do SGR).

O SGD (Streamlit) depende de WebSocket persistente em `/_stcore/stream` para o
slideshow funcionar — sem os 3 ajustes abaixo, a página carrega mas fica presa
em loading infinito (`WebSocket onerror` em loop no console do navegador).

**Este arquivo é só um template/referência.** A aplicação real acontece via
WebAdmin (GUI) ou editando `/usr/local/lsws/conf/vhosts/dashboard/vhost.conf`
diretamente na VPS — não é lido automaticamente pelo OpenLiteSpeed a partir
deste repositório.

## 1. Bloco `context /` (proxy reverso para o container Docker)

```
context / {
  type                    proxy
  handler                 dashboard-web
  addDefaultCharset       off
  enableWebSocket         1
}
```

`enableWebSocket 1` é necessário, mas **não suficiente sozinho** (ver item 3).

## 2. Bloco `vhssl` (desliga HTTP/2 para este vhost)

```
vhssl  {
  ...
  enableSpdy              0
}
```

Sem isso, o navegador negocia HTTP/2 (ALPN) e o OpenLiteSpeed retorna
`400 Can "Upgrade" only to "WebSocket"` — não faz upgrade de WebSocket clássico
sobre HTTP/2. Bitmask do campo (referência): `1=SPDY/2 2=SPDY/3 4=HTTP/2
8=HTTP/3 0=None`. Isolado por vhost — não afeta os demais apps da VPS.

## 3. Bloco `websocket` dedicado (causa raiz real)

```
websocket /_stcore/stream {
  address                 127.0.0.1:8113
}
```

Mesmo com o upgrade completando (HTTP 101), sem este bloco dedicado a resposta
do proxy genérico (`context /`) traz `Connection: Keep-Alive` em vez de
`Connection: Upgrade` — o navegador valida isso no cliente e rejeita a conexão
(`curl` não detecta esse problema, só um navegador real ou um teste WS de
verdade). Este bloco `websocket` é um mecanismo nativo do OpenLiteSpeed,
distinto e complementar ao `context` genérico.

A porta `8113` deve bater com a porta publicada em `stack.yml`
(`127.0.0.1:8113:8113`).

## Como validar

1. `curl -v` simulando o handshake:
   ```bash
   curl -v --resolve dashboard.oficialsport.com.br:443:195.200.1.244 \
     -H 'Connection: Upgrade' -H 'Upgrade: websocket' \
     -H 'Sec-WebSocket-Version: 13' -H 'Sec-WebSocket-Key: dGhlIHNhbXBsZQ==' \
     https://dashboard.oficialsport.com.br/_stcore/stream
   ```
   A resposta deve trazer `connection: Upgrade` (não `Keep-Alive`).
2. Validar de verdade com uma conexão WS real (navegador, DevTools → Network →
   WS), já que `curl` sozinho não pega o erro de `Connection: Keep-Alive`.

## Pendência de segurança relacionada

A porta 5432 do Postgres nativo do host está hoje 100% exposta à internet
pública e sob varredura ativa de bots (ver memória de projeto
`projeto-seguranca-porta-5432`). O `stack.yml` do SGD já conecta via
`host-postgres` (rede interna do Docker), eliminando o hop público para esta
app — mas o fechamento efetivo da porta 5432 no firewall do host é uma ação
pendente, de escopo de toda a VPS (não só do SGD), que precisa ser aplicada
pelo usuário diretamente (fora do escopo de ações que o Claude Code executa
sozinho).
